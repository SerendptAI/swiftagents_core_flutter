name: swift_agents
description: "An sdk for swift agents"
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  video_player: ^2.11.1
  marqueer: ^2.5.0
  rive: ^0.14.7
  dio: ^5.9.2
  provider: ^6.1.5+1
  logger: ^2.7.0
  cached_network_image: ^3.4.1
  internet_connection_checker: ^3.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  fonts:
    - family: DMMono
      fonts:
        - asset: assets/fonts/dmMono/DMMono-Regular.ttf #default (w400)
        - asset: assets/fonts/dmMono/DMMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/dmMono/DMMono-Light.ttf
          weight: 300
        - asset: assets/fonts/dmMono/DMMono-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/dmMono/DMMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/dmMono/DMMono-MediumItalic.ttf
          weight: 500
          style: italic
    - family: Stoizi
      fonts:
        - asset: assets/fonts/stoizi/stolzl_regular.otf #default (w400)
        - asset: assets/fonts/stoizi/stolzl_thin.otf
          weight: 100
        - asset: assets/fonts/stoizi/stolzl_light.otf
          weight: 200
        - asset: assets/fonts/stoizi/stolzl_book.otf
          weight: 300
        - asset: assets/fonts/stoizi/stolzl_medium.otf
          weight: 500
        - asset: assets/fonts/stoizi/stolzl_bold.otf
          weight: 700
    - family: GreedNarrow
      fonts:
        - asset: assets/fonts/greedNarrow/GreedNarrow-TRIAL-Medium.otf #default (w500)
          weight: 500


  assets:
    - assets/svgs/
    - assets/rives/
    - assets/images/

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
